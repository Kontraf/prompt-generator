<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Prompt Craft // Terminal</title>
    <style>
        :root {
            --bg-color: #05070f;
            --card-bg: rgba(13, 20, 38, 0.6);
            --accent-neon: #00ffc4;
            --accent-blue: #00d2ff;
            --text-main: #e2e8f0;
            --text-muted: #64748b;
            --border-color: #1e293b;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(0, 255, 196, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(0, 210, 255, 0.05) 0px, transparent 50%);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            border-bottom: 1px solid var(--border-color);
            padding: 40px 20px;
            text-align: center;
            background: rgba(5, 7, 15, 0.8);
            backdrop-filter: blur(10px);
        }

        header h1 {
            margin: 0;
            font-size: 2.5rem;
            color: var(--accent-neon);
            text-shadow: 0 0 15px rgba(0, 255, 196, 0.4);
            letter-spacing: 2px;
            font-weight: 900;
        }

        header p {
            margin: 10px 0 0 0;
            color: var(--accent-blue);
            font-size: 0.95rem;
            letter-spacing: 1px;
            text-shadow: 0 0 8px rgba(0, 210, 255, 0.3);
        }

        .container {
            max-width: 750px;
            margin: 40px auto;
            padding: 0 20px;
            flex-grow: 1;
            width: 100%;
            box-sizing: border-box;
        }

        .form-card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 35px;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(12px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .form-group {
            margin-bottom: 25px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        label {
            font-weight: bold;
            color: var(--accent-blue);
            font-size: 0.9rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        select, textarea {
            background-color: rgba(5, 7, 15, 0.8);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 14px;
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            transition: all 0.3s ease;
        }

        select:focus, textarea:focus {
            border-color: var(--accent-neon);
            box-shadow: 0 0 10px rgba(0, 255, 196, 0.2);
        }

        textarea {
            resize: vertical;
            min-height: 120px;
            line-height: 1.5;
        }

        /* Customize select arrows for cyber feel */
        select {
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg fill='%2300ffc4' height='24' viewBox='0 0 24 24' width='24' xmlns='http://www.w3.org/2000/svg'><path d='M7 10l5 5 5-5z'/><path d='M0 0h24v24H0z' fill='none'/></svg>");
            background-repeat: no-repeat;
            background-position: right 12px center;
            padding-right: 40px;
        }

        .btn {
            background: transparent;
            color: var(--accent-neon);
            border: 1px solid var(--accent-neon);
            padding: 16px 20px;
            font-size: 1.1rem;
            font-weight: bold;
            font-family: inherit;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 10px;
            box-shadow: 0 0 10px rgba(0, 255, 196, 0.1);
        }

        .btn:hover {
            background-color: var(--accent-neon);
            color: var(--bg-color);
            box-shadow: 0 0 20px rgba(0, 255, 196, 0.4);
        }

        /* Output Section */
        .output-container {
            margin-top: 35px;
            display: none;
            background-color: rgba(5, 7, 15, 0.9);
            border: 1px solid var(--accent-blue);
            border-radius: 8px;
            padding: 25px;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.15);
        }

        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px dashed var(--border-color);
            padding-bottom: 10px;
        }

        .output-title {
            color: var(--accent-blue);
            font-weight: bold;
            font-size: 0.85rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .copy-btn {
            background-color: transparent;
            color: var(--accent-blue);
            border: 1px solid var(--accent-blue);
            padding: 6px 14px;
            font-size: 0.8rem;
            font-family: inherit;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .copy-btn:hover {
            background-color: var(--accent-blue);
            color: var(--bg-color);
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.3);
        }

        #outputPrompt {
            white-space: pre-wrap;
            font-size: 0.9rem;
            line-height: 1.6;
            color: #cbd5e1;
            margin: 0;
        }

        footer {
            background-color: rgba(5, 7, 15, 0.9);
            color: var(--text-muted);
            text-align: center;
            padding: 25px;
            border-top: 1px solid var(--border-color);
            font-size: 0.8rem;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <header>
        <h1>⚡ PROMPT_CRAFT.EXE</h1>
        <p>[STATUS: ONLINE] // SYSTEM INITIALIZED</p>
    </header>

    <div class="container">
        <div class="form-card">
            
            <!-- Επιλογή Ρόλου -->
            <div class="form-group">
                <label for="roleSelect">01_SELECT_SYSTEM_ROLE</label>
                <select id="roleSelect">
                    <option value="expert-coder">💻 Expert Software Engineer (For clean, efficient & documented code)</option>
                    <option value="debate-coach">🗣️ World-Class Debate Coach (For argument analysis, rebuttals & strategy)</option>
                    <option value="tech-writer">✍️ Technical Writer (For clear, well-structured documentation)</option>
                    <option value="math-tutor">📐 STEM University Professor (For step-by-step educational explanations)</option>
                    <option value="general">🤖 General Helpful Assistant</option>
                </select>
            </div>

            <!-- Επιλογή Ύφους -->
            <div class="form-group">
                <label for="toneSelect">02_CHOOSE_OUTPUT_STYLE</label>
                <select id="toneSelect">
                    <option value="professional">Professional, formal and direct</option>
                    <option value="educational">Educational, explaining "why" behind concepts</option>
                    <option value="simple">Extremely simple, "Explain Like I'm 5" (ELI5)</option>
                    <option value="creative">Creative, engaging and out-of-the-box</option>
                </select>
            </div>

            <!-- Πλαίσιο Εισαγωγής Θέματος -->
            <div class="form-group">
                <label for="taskInput">03_INPUT_CORE_TASK</label>
                <textarea id="taskInput" placeholder="Enter task instructions here (e.g., 'Explain the difference between AC and DC electricity', 'Write a python script to parse a JSON file')"></textarea>
            </div>

            <!-- Κουμπί Παραγωγής -->
            <button class="btn" onclick="generatePrompt()">COMPILE_PROMPT_</button>

            <!-- Περιοχή Εμφάνισης Αποτελέσματος -->
            <div class="output-container" id="outputSection">
                <div class="output-header">
                    <span class="output-title">OUTPUT_BUFFER:</span>
                    <button class="copy-btn" id="copyBtn" onclick="copyToClipboard()">COPY_TO_CLIPBOARD</button>
                </div>
                <p id="outputPrompt"></p>
            </div>

        </div>
    </div>

    <footer>
        <p>SYSTEM_DESIGN BY GEORGE KONTRAFOURIS[cite: 1] // YEAR: 2026</p>
    </footer>

    <script>
        const systemPrompts = {
            "expert-coder": "You are an elite Software Engineer with decades of experience. Your code is production-ready, highly optimized, secure, and adheres to best practices. Always include concise comments and explain your logic.",
            "debate-coach": "You are a world-class Debate Coach and tournament-winning adjudicator. Analyze inputs through a critical lens. Identify logical fallacies, construct strong counter-arguments, and offer tactical advice on strategy and persuasion.",
            "tech-writer": "You are a professional Technical Writer. Your job is to make complex concepts incredibly easy to read. Use clear headings, bullet points, bold text for key terms, and maintain a highly structured layout.",
            "math-tutor": "You are an enthusiastic University Professor in STEM. You excel at breaking down complex engineering, mathematical, or scientific concepts into clear, logical, step-by-step explanations, encouraging deep understanding.",
            "general": "You are a highly capable, objective, and helpful AI assistant."
        };

        const tonePrompts = {
            "professional": "Maintain a highly professional, academic, and objective tone. Avoid fluff and be direct.",
            "educational": "Adopt an educational and encouraging tone. Explain the underlying principles of the solution so the reader learns the 'why' behind it.",
            "simple": "Explain things using extremely simple language, analogies, and zero jargon. Imagine you are explaining this to a 10-year-old.",
            "creative": "Use an engaging, vivid, and highly creative style with interesting metaphors to deliver your response."
        };

        function generatePrompt() {
            const role = document.getElementById('roleSelect').value;
            const tone = document.getElementById('toneSelect').value;
            const task = document.getElementById('taskInput').value.trim();

            if (task === "") {
                alert("ERROR: Empty task buffer. Please enter instructions.");
                return;
            }

            const finalPrompt = `[SYSTEM INSTRUCTION]
${systemPrompts[role]}
${tonePrompts[tone]}

[USER TASK]
${task}

[OUTPUT RULES]
Deliver the response in a highly structured format matching the system instructions above.`;

            document.getElementById('outputPrompt').textContent = finalPrompt;
            document.getElementById('outputSection').style.display = 'block';
            document.getElementById('copyBtn').textContent = "COPY_TO_CLIPBOARD";
            
            document.getElementById('outputSection').scrollIntoView({ behavior: 'smooth' });
        }

        function copyToClipboard() {
            const promptText = document.getElementById('outputPrompt').textContent;
            
            navigator.clipboard.writeText(promptText).then(() => {
                const copyBtn = document.getElementById('copyBtn');
                copyBtn.textContent = "COPIED_SUCCESSFULLY!";
            }).catch(err => {
                console.error('Failed to copy text: ', err);
            });
        }
    </script>
</body>
</html>
