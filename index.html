<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Prompt Craft - Cyber Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #05070a;
        }
        .terminal-glow {
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.15);
        }
        /* Custom scrollbar για cyberpunk look */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #090d16;
        }
        ::-webkit-scrollbar-thumb {
            background: #1e293b;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #38bdf8;
        }
    </style>
</head>
<body class="text-slate-100 min-h-screen p-6 flex items-center justify-center">

    <div class="w-full max-w-4xl bg-slate-950 border border-cyan-500/30 rounded-lg p-6 terminal-glow">
        
        <!-- Terminal Header -->
        <header class="border-b border-cyan-500/20 pb-4 mb-6 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold tracking-widest text-cyan-400">⚡ AI PROMPT CRAFT v2.0</h1>
                <p class="text-xs text-cyan-600/80 mt-1">SYSTEM_INSTRUCTION_GENERATOR // LOGGED_IN_AS: DEVELOPER</p>
            </div>
            <div class="flex gap-2">
                <span class="w-3 h-3 rounded-full bg-red-500/70 inline-block"></span>
                <span class="w-3 h-3 rounded-full bg-yellow-500/70 inline-block"></span>
                <span class="w-3 h-3 rounded-full bg-green-500/70 inline-block"></span>
            </div>
        </header>

        <!-- Role Presets Selection -->
        <section class="mb-6">
            <label class="block text-xs font-bold text-cyan-500 uppercase tracking-wider mb-2">⚡ Select Target Role Preset</label>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                <button onclick="loadPreset('strategy')" class="preset-btn border border-slate-800 hover:border-cyan-500 bg-slate-900/50 p-3 rounded text-left text-sm transition-all duration-200">
                    <span class="text-cyan-400 font-bold block text-xs">ROLE 01 // STRATEGIST</span>
                    Communication Strategist
                </button>
                <button onclick="loadPreset('presales')" class="preset-btn border border-slate-800 hover:border-cyan-500 bg-slate-900/50 p-3 rounded text-left text-sm transition-all duration-200">
                    <span class="text-cyan-400 font-bold block text-xs">ROLE 02 // SALES</span>
                    Presales Writer for Offers
                </button>
                <button onclick="loadPreset('content')" class="preset-btn border border-slate-800 hover:border-cyan-500 bg-slate-900/50 p-3 rounded text-left text-sm transition-all duration-200">
                    <span class="text-cyan-400 font-bold block text-xs">ROLE 03 // WRITER</span>
                    Content Writer
                </button>
                <button onclick="loadPreset('copy')" class="preset-btn border border-slate-800 hover:border-cyan-500 bg-slate-900/50 p-3 rounded text-left text-sm transition-all duration-200">
                    <span class="text-cyan-400 font-bold block text-xs">ROLE 04 // CREATIVE</span>
                    Creative Copywriter
                </button>
            </div>
        </section>

        <!-- Customize Inputs -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
            <div>
                <label class="block text-xs font-bold text-cyan-500 uppercase tracking-wider mb-2">Primary Goal / Mission</label>
                <textarea id="goal" class="w-full h-32 bg-slate-900 border border-slate-800 rounded p-3 text-sm focus:outline-none focus:border-cyan-500 text-slate-300" placeholder="What is the main objective of this AI role?"></textarea>
            </div>
            <div>
                <label class="block text-xs font-bold text-cyan-500 uppercase tracking-wider mb-2">Tone & Style Guidelines</label>
                <textarea id="tone" class="w-full h-32 bg-slate-900 border border-slate-800 rounded p-3 text-sm focus:outline-none focus:border-cyan-500 text-slate-300" placeholder="Tone of voice, professional terms, what to avoid..."></textarea>
            </div>
        </div>

        <!-- Generate & Output -->
        <div class="mb-6">
            <button onclick="compilePrompt()" class="w-full bg-cyan-500 hover:bg-cyan-600 text-slate-950 font-bold py-3 px-4 rounded tracking-wider transition duration-200 text-sm">
                COMPILE SYSTEM INSTRUCTION_
            </button>
        </div>

        <!-- Output Terminal -->
        <div>
            <div class="flex justify-between items-center mb-2">
                <label class="text-xs font-bold text-cyan-500 uppercase tracking-wider">Generated System Prompt</label>
                <button onclick="copyToClipboard()" class="text-xs text-cyan-400 hover:underline">Copy Prompt</button>
            </div>
            <textarea id="output" readonly class="w-full h-48 bg-slate-900/50 border border-cyan-500/20 rounded p-3 text-xs text-cyan-400 focus:outline-none focus:border-cyan-500 font-mono leading-relaxed" placeholder="Compiled system instructions will appear here..."></textarea>
        </div>

    </div>

    <script>
        // Τα δεδομένα για τα 4 νέα επαγγελματικά templates
        const presets = {
            strategy: {
                goal: "Develop high-level communication strategies, brand positioning concepts, and comprehensive campaign timelines for clients of a premium communication agency.",
                tone: "Analytical, strategic, industry-authoritative, yet highly persuasive and visionary. Use marketing-agency frameworks (e.g., SWOT, target persona breakdown)."
            },
            presales: {
                goal: "Write compelling, professional, and winning commercial offers, request-for-proposal (RFP) responses, and high-conversion presales proposals.",
                tone: "Client-centric, outcome-oriented, professional, persuasive, and structured. Emphasize value proposition, security, efficiency, and clear business outcomes."
            },
            content: {
                goal: "Produce high-quality, engaging, and SEO-optimized blog posts, articles, newsletters, and educational guides that build brand authority and trust.",
                tone: "Informative, approachable, clear, and thoroughly researched. Keep formatting clean using bold text, listicles, and strong introductory hooks."
            },
            copy: {
                goal: "Craft high-converting ad copy, viral social media hooks (LinkedIn, Instagram), landing page headers, and catchy marketing slogans.",
                tone: "Creative, high-energy, emotionally-driven, and concise. Utilize copywriting frameworks (e.g., AIDA, PAS) and prioritize powerful call-to-actions (CTAs)."
            }
        };

        // Συνάρτηση για τη φόρτωση των presets στα textareas
        function loadPreset(key) {
            if (presets[key]) {
                document.getElementById('goal').value = presets[key].goal;
                document.getElementById('tone').value = presets[key].tone;
                
                // Οπτικό feedback στα buttons
                document.querySelectorAll('.preset-btn').forEach(btn => {
                    btn.classList.remove('border-cyan-500', 'bg-cyan-950/20');
                    btn.classList.add('border-slate-800');
                });
                
                // Highlight το επιλεγμένο button
                event.currentTarget.classList.remove('border-slate-800');
                event.currentTarget.classList.add('border-cyan-500', 'bg-cyan-950/20');
            }
        }

        // Συνάρτηση "γέφυρα" για τη δημιουργία του τελικού prompt
        function compilePrompt() {
            const goal = document.getElementById('goal').value.trim();
            const tone = document.getElementById('tone').value.trim();

            if (!goal || !tone) {
                alert("Please fill in or select a Role Preset before compiling!");
                return;
            }

            const compiled = `# SYSTEM INSTRUCTIONS: AI EXPERT AGENT
            
## 1. IDENTITY & ROLE
You are a world-class specialist trained to act as a:
- ${goal}

## 2. GOAL & MISSION
Your absolute objective is to:
- Deliver top-tier, ready-to-use output that fulfills the user's brief perfectly on the first try.
- Adopt the following specific professional stance and focus areas: ${goal}

## 3. TONE & STYLE GUIDELINES
Maintain these stylistic patterns in all responses:
- ${tone}
- Be direct, highly structured, and avoid filler or unnecessary meta-commentary (e.g., do not say "Sure, I can help you with that").

## 4. OUTPUT FORMAT
Unless instructed otherwise by the user:
- Use markdown (headings, bold text, bullet points) to optimize readability.
- Prioritize high-impact, professional-grade language.`;

            document.getElementById('output').value = compiled.replace(/^[ ]+/gm, ''); // Καθαρίζει τα κενά αριστερά
        }

        // Αντιγραφή στο Clipboard
        function copyToClipboard() {
            const outputText = document.getElementById('output');
            if (!outputText.value) return;

            outputText.select();
            document.execCommand('copy');
            alert('System prompt copied to clipboard!');
        }
    </script>
</body>
</html>
