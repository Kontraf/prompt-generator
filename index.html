<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Prompt Craft // BRUTALIST_EDITION</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --accent-yellow: #ffeb3b;
            --text-main: #000000;
            --border-color: #000000;
        }

        body {
            font-family: 'Arial Black', Gadget, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            padding: 40px 20px;
            text-align: center;
            border-bottom: 4px solid var(--border-color);
            background: var(--accent-yellow);
        }

        header h1 {
            margin: 0;
            font-size: 2.5rem;
            letter-spacing: -1px;
            text-transform: uppercase;
        }

        header p {
            margin: 10px 0 0 0;
            font-size: 0.95rem;
            text-transform: uppercase;
        }

        .container {
            max-width: 750px;
            margin: 40px auto;
            padding: 0 20px;
            flex-grow: 1;
            width: 100%;
        }

        .form-card {
            background-color: #f4f4f4;
            border: 4px solid var(--border-color);
            padding: 35px;
        }

        .form-group {
            margin-bottom: 25px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        label {
            font-weight: 900;
            font-size: 0.9rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        select, textarea {
            background-color: #ffffff;
            color: var(--text-main);
            border: 3px solid var(--border-color);
            padding: 14px;
            font-size: 0.95rem;
            font-family: inherit;
            font-weight: bold;
            outline: none;
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        .btn {
            background: var(--accent-yellow);
            color: var(--text-main);
            border: 4px solid var(--border-color);
            padding: 16px 20px;
            font-size: 1.1rem;
            font-weight: 900;
            font-family: inherit;
            text-transform: uppercase;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }

        .btn:hover {
            background-color: var(--text-main);
            color: #ffffff;
        }

        .output-container {
            margin-top: 35px;
            display: none;
            background-color: #ffffff;
            border: 4px solid var(--border-color);
            padding: 25px;
        }

        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
        }

        .output-title {
            font-weight: 900;
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        .copy-btn {
            background-color: transparent;
            color: var(--text-main);
            border: 2px solid var(--border-color);
            padding: 6px 14px;
            font-size: 0.8rem;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
        }

        .copy-btn:hover {
            background-color: var(--text-main);
            color: #ffffff;
        }

        #outputPrompt {
            white-space: pre-wrap;
            font-family: 'Courier New', Courier, monospace;
            line-height: 1.6;
            margin: 0;
            font-size: 0.9rem;
            font-weight: bold;
        }

        footer {
            text-align: center;
            padding: 25px;
            border-top: 4px solid var(--border-color);
            font-weight: 900;
            font-size: 0.8rem;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <header>
        <h1>⚡ PROMPT_CRAFT.EXE</h1>
        <p>[STATUS: ONLINE] // SYSTEM INITIALIZED</p>
    </header>

    <div class="container">
        <div class="form-card">

            <div class="form-group">
                <label for="roleSelect">01_SELECT_SYSTEM_ROLE</label>
                <select id="roleSelect">
                    <option value="policy-officer">🇪🇺 Policy Officer (European Commission standards)</option>
                    <option value="gov-comms">🏛️ Institutional Communications (Government/State)</option>
                    <option value="crypto-analyst">📊 Crypto Trading & Quantitative Analyst</option>
                    <option value="expert-coder">💻 Expert Software Engineer</option>
                    <option value="business-analyst">📊 Business Analyst</option>
                    <option value="qa-engineer">🧪 QA Automation Engineer</option>
                    <option value="devops-engineer">☁️ DevOps Engineer</option>
                    <option value="scrum-master">🔄 Scrum Master</option>
                    <option value="communication-strategist">📢 Communication Strategist</option>
                    <option value="presales-writer">💼 Presales Writer</option>
                    <option value="content-writer">✍️ Content Writer</option>
                    <option value="creative-copywriter">🎨 Creative Copywriter</option>
                    <option value="debate-coach">🗣️ World-Class Debate Coach</option>
                    <option value="general">🤖 General AI</option>
                </select>
            </div>

            <div class="form-group">
                <label for="toneSelect">02_CHOOSE_OUTPUT_STYLE</label>
                <select id="toneSelect">
                    <option value="professional">Professional, formal and direct</option>
                    <option value="educational">Educational, explaining "why"</option>
                    <option value="creative">Creative, highly engaging</option>
                    <option value="minimalist">Minimalist, straight to the point</option>
                </select>
            </div>

            <div class="form-group">
                <label for="taskInput">03_INPUT_CORE_TASK</label>
                <textarea id="taskInput" placeholder="Enter task instructions here..."></textarea>
            </div>

            <button class="btn" onclick="generatePrompt()">COMPILE_PROMPT_</button>

            <div class="output-container" id="outputSection">
                <div class="output-header">
                    <span class="output-title">OUTPUT_BUFFER:</span>
                    <button class="copy-btn" id="copyBtn" onclick="copyToClipboard()">COPY_TO_CLIPBOARD</button>
                </div>
                <p id="outputPrompt"></p>
            </div>

        </div>
    </div>

    <footer>
        <p>SYSTEM_DESIGN BY GEORGE KONTRAFOURIS // YEAR: 2026</p>
    </footer>

    <script>
        const systemPrompts = {
            "policy-officer": "You are a Policy Officer for the European Commission. Your language is formal, precise, and objective. You specialize in regulatory compliance, EU legislative frameworks, stakeholder engagement, and impact assessments.",
            "gov-comms": "You are an expert in Institutional Communications for Government and State organizations. Your tone is authoritative, reassuring, and transparent. You excel at drafting official announcements, public service messaging, and crisis management communication.",
            "crypto-analyst": "You are an expert Crypto Trading Systems and Quantitative Analyst. You specialize in algorithmic trading strategies, grid bots, automated risk management frameworks, order execution optimization, exchange API integrations, and tokenomics math.",
            "expert-coder": "You are an elite Software Engineer with decades of experience. Your code is production-ready, highly optimized, secure, and adheres to best practices.",
            "business-analyst": "You are a Senior Business Analyst in an enterprise IT environment. Your job is to translate complex business needs into clear, structured requirements, functional specifications, and detailed Agile User Stories.",
            "qa-engineer": "You are an expert QA Automation Engineer. You excel at identifying edge cases, writing comprehensive testing strategies, generating automated test scripts, and drafting manual test cases.",
            "devops-engineer": "You are a seasoned DevOps & Cloud Infrastructure Engineer. Your expertise lies in writing secure Dockerfiles, Kubernetes manifests, CI/CD pipelines, and automating cloud deployments.",
            "scrum-master": "You are an experienced Agile Scrum Master. Your mission is to facilitate sprint planning, resolve team bottlenecks, structure retrospectives, and optimize team velocity.",
            "communication-strategist": "You are a senior Communication Strategist at a top-tier agency. Your job is to design comprehensive communication blueprints, position brands with precision, and structure clear campaign timelines.",
            "presales-writer": "You are a highly skilled Presales Writer. Your goal is to draft commercial offers, persuasive sales letters, RFP replies, and proposal structures that maximize conversion rate.",
            "content-writer": "You are an experienced Content Writer specializing in SEO and high-retention copy. You produce thoroughly-researched, authoritative blog articles and newsletters.",
            "creative-copywriter": "You are an elite Creative Copywriter. You excel at drafting high-converting social media posts, catchy landing page copy, and headlines using AIDA and PAS frameworks.",
            "debate-coach": "You are a world-class Debate Coach and tournament-winning adjudicator. Analyze inputs through a critical lens, identify logical fallacies, and construct strong counter-arguments.",
            "general": "You are a highly capable, objective, and helpful AI assistant."
        };

        const tonePrompts = {
            "professional": "Maintain a highly professional, academic, and objective tone. Avoid fluff and be direct.",
            "educational": "Adopt an educational and encouraging tone. Explain the underlying principles of the solution so the reader learns the 'why' behind it.",
            "creative": "Be highly engaging, creative, and enthusiastic. Use vivid descriptions, metaphors, and punchy hooks.",
            "minimalist": "Provide minimal, concise explanations. Focus purely on immediate, actionable solutions with zero wordiness."
        };

        function generatePrompt() {
            const role = document.getElementById('roleSelect').value;
            const tone = document.getElementById('toneSelect').value;
            const task = document.getElementById('taskInput').value.trim();

            if (task === "") {
                alert("ERROR: Empty task buffer. Please enter instructions.");
                return;
            }

            const finalPrompt = `[SYSTEM INSTRUCTION]
${systemPrompts[role]}
${tonePrompts[tone]}

[CORE TASK]
${task}

[OUTPUT RULES]
Deliver the response in a highly structured format matching the system instructions above.`;

            document.getElementById('outputPrompt').textContent = finalPrompt;
            document.getElementById('outputSection').style.display = 'block';
            document.getElementById('copyBtn').textContent = "COPY_TO_CLIPBOARD";
            document.getElementById('outputSection').scrollIntoView({ behavior: 'smooth' });
        }

        function copyToClipboard() {
            const promptText = document.getElementById('outputPrompt').textContent;
            navigator.clipboard.writeText(promptText).then(() => {
                const copyBtn = document.getElementById('copyBtn');
                copyBtn.textContent = "COPIED_SUCCESSFULLY!";
            }).catch(err => {
                console.error('Failed to copy text: ', err);
            });
        }
    </script>
</body>
</html>
